<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Main</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .main-box {
            text-align: center;
            background-color: white;
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 450px;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #212529;
        }

        .main-subtitle {
            color: #6c757d;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .start-btn {
            width: 220px;
            height: 55px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="main-box">
    <div class="main-title">📋 Todo List</div>
    <div class="main-subtitle">오늘 할 일을 간단하게 관리해보세요</div>
    <a href="/todos" class="btn btn-primary start-btn">시작하기</a>
</div>
</body>
</html>
